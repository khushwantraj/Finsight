version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://finsight:finsight@postgres:5432/finsight
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker:
    build: .
    command: celery -A finsight.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://finsight:finsight@postgres:5432/finsight
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  beat:
    build: .
    command: celery -A finsight.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://finsight:finsight@postgres:5432/finsight
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
